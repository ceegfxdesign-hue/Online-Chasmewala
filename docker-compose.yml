services:
  mongo:
    image: mongo:7
    container_name: och-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - och-mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: och-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      API_PREFIX: /api/v1
      MONGODB_URI: mongodb://mongo:27017/online-chasmewala
      CLIENT_URL: http://localhost:5173
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me_please_32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me_please_32chars}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api/v1
    container_name: och-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  och-mongo-data:
